/* ----------------------------------------------------------
   NUMEROLOGY ENGINE
---------------------------------------------------------- */
function digitSum(str){
  var s = 0;
  for (var i=0;i<str.length;i++){ s += parseInt(str.charAt(i),10); }
  return s;
}
function reduceRoot(str){
  var n = digitSum(str);
  while (n > 9 && n !== 11 && n !== 22 && n !== 33){
    n = digitSum(String(n));
  }
  return n;
}
function uniqueInOrder(arr){
  var seen = {}, out = [];
  for (var i=0;i<arr.length;i++){
    if (!seen[arr[i]]){ seen[arr[i]] = true; out.push(arr[i]); }
  }
  return out;
}
function countOf(arr, val){
  var c = 0;
  for (var i=0;i<arr.length;i++){ if (arr[i]===val) c++; }
  return c;
}
function ampLabel(count){
  if (count === 2) return "doubled - amplified";
  if (count === 3) return "tripled - an urgent, clear signal";
  if (count >= 4) return "repeated - a wide-open portal";
  return "";
}
function isSequential(digs){
  if (digs.length < 3) return 0;
  var asc = true, desc = true;
  for (var i=1;i<digs.length;i++){
    if (parseInt(digs[i],10) !== parseInt(digs[i-1],10)+1) asc = false;
    if (parseInt(digs[i],10) !== parseInt(digs[i-1],10)-1) desc = false;
  }
  if (asc) return 1;
  if (desc) return -1;
  return 0;
}
function isMirror(digs){
  if (digs.length < 3) return false;
  for (var i=0,j=digs.length-1;i<j;i++,j--){
    if (digs[i] !== digs[j]) return false;
  }
  return true;
}
function allSame(digs){
  for (var i=1;i<digs.length;i++){ if (digs[i] !== digs[0]) return false; }
  return true;
}

/* ----------------------------------------------------------
   READING BUILDER
---------------------------------------------------------- */
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function block(tag, key, name, text){
  return '<div class="block">'+
           '<div class="tag">'+esc(tag)+'<span class="key">'+esc(key)+'</span></div>'+
           '<div class="name">'+esc(name)+'</div>'+
           '<p>'+esc(text)+'</p>'+
         '</div>';
}
function buildReading(raw){
  var str = raw.replace(/[^0-9]/g,"");
  var errorEl = document.getElementById("error");
  errorEl.textContent = "";

  if (str.length === 0){ errorEl.textContent = "Enter a number to decode."; return null; }
  if (str.length > 6){ errorEl.textContent = "Try a sequence of 6 digits or fewer."; return null; }

  var digs = str.split("");
  var sum = digitSum(str);
  var root = reduceRoot(str);
  var html = '<div class="scroll">';

  html += '<div class="sigil"><div class="num">'+esc(str)+'</div></div>';
  var sumExpr = digs.join(" + ") + " = " + sum;
  var rootExpr = (sum === root) ? sumExpr : (sumExpr + "  to  " + root);
  html += '<div class="root-line">'+esc(rootExpr)+'</div>';
  html += '<div class="rule"></div>';

  var headline;
  if (allSame(digs) && digs.length >= 2){
    headline = "A portal of pure " + DIGITS[digs[0]].name.split(",")[0].toLowerCase() + " energy.";
  } else if (MASTERS[str]){
    headline = MASTERS[str].name.split(" - ")[1] + " is calling you.";
  } else {
    var rk = MASTERS[String(root)] ? MASTERS[String(root)] : DIGITS[String(root)];
    headline = "Carried by the root of " + root + " - " + rk.name.split(",")[0].split(" - ").slice(-1)[0].toLowerCase() + ".";
  }
  html += '<div class="headline">'+esc(headline)+'</div>';

  if (MASTERS[str]){
    html += block("Master Number", str, MASTERS[str].name, MASTERS[str].text);
  }

  var seq = isSequential(digs);
  if (allSame(digs) && digs.length >= 2){
    html += block("Pattern", "x"+digs.length, "A repeating portal",
      "The same digit stacked is one of the loudest signs there is. Its single meaning is turned all the way up. Stop and notice what you were just thinking or doing.");
  } else if (seq === 1){
    html += block("Pattern", "asc", "Forward motion",
      "Numbers climbing in order point to progress falling into place, step after step. Keep moving in the direction you have started.");
  } else if (seq === -1){
    html += block("Pattern", "desc", "Unwinding",
      "Numbers stepping down signal a release - something is completing and being let go in the right order. Allow it.");
  } else if (isMirror(digs)){
    html += block("Pattern", "mirror", "A reflection",
      "A mirror sequence shows your inner and outer worlds lining up. What you feel inside is starting to show outside. Alignment.");
  }

  if (!(allSame(digs) && digs.length >= 2)){
    var uniq = uniqueInOrder(digs);
    var rows = "";
    for (var i=0;i<uniq.length;i++){
      var d = uniq[i];
      var c = countOf(digs, d);
      var amp = c > 1 ? '<span class="amp">'+esc(ampLabel(c))+'</span>' : '';
      rows += '<div class="digit-row">'+
                '<div class="glyph">'+esc(d)+'</div>'+
                '<div class="body"><div class="name">'+esc(DIGITS[d].name)+'</div>'+amp+
                '<p>'+esc(DIGITS[d].text)+'</p></div>'+
              '</div>';
    }
    html += '<div class="block"><div class="tag">The digits within</div>'+rows+'</div>';
  }

  if (!MASTERS[str]){
    var rootDef = MASTERS[String(root)] ? MASTERS[String(root)] : DIGITS[String(root)];
    html += block("The current beneath it", String(root),
      (MASTERS[String(root)] ? rootDef.name : "Root " + root + " - " + rootDef.name),
      "Reduced down, this sequence carries a "+root+". " + rootDef.text);
  }

  var closeKey = MASTERS[str] ? str : String(root);

  var lifeKey = MASTERS[str] ? str : String(root);
  var life = LIFE[lifeKey] || LIFE[String(root)];
  if (life){
    var lifeRows =
      '<div class="life-row"><div class="area">In love and connection</div><p>'+esc(life.love)+'</p></div>'+
      '<div class="life-row"><div class="area">At work and in your calling</div><p>'+esc(life.work)+'</p></div>'+
      '<div class="life-row"><div class="area">With money and abundance</div><p>'+esc(life.money)+'</p></div>'+
      '<div class="life-row"><div class="area">In spirit</div><p>'+esc(life.spirit)+'</p></div>';
    html += '<div class="block"><div class="tag">What it means for you</div>'+lifeRows+'</div>';
  }

  var closeText = ROOT_CLOSE[closeKey] || ROOT_CLOSE[String(root)] || "";
  if (closeText){ html += '<div class="close">'+esc(closeText)+'</div>'; }

  var affText = AFFIRM[closeKey] || AFFIRM[String(root)] || "";
  if (affText){
    html += '<div class="affirm"><div class="area">Your affirmation</div><p>'+esc(affText)+'</p></div>';
  }

  html += '</div>';
  return html;
}

/* ----------------------------------------------------------
   WIRING
---------------------------------------------------------- */
function run(){
  var input = document.getElementById("numInput");
  var html = buildReading(input.value);
  var result = document.getElementById("result");
  if (html === null){ result.classList.remove("show"); result.innerHTML = ""; return; }
  result.classList.remove("show");
  result.innerHTML = html;
  void result.offsetWidth;
  result.classList.add("show");
  result.scrollIntoView({behavior:"smooth", block:"start"});
}
document.getElementById("revealBtn").addEventListener("click", run);
document.getElementById("numInput").addEventListener("keydown", function(e){
  if (e.key === "Enter"){ run(); }
});
var CHIP_NUMS = ["111","222","333","717","1111","1044","1114"];
var chipWrap = document.getElementById("chips");
for (var i=0;i<CHIP_NUMS.length;i++){
  (function(n){
    var b = document.createElement("button");
    b.className = "chip";b.type = "button";b.textContent = n;
    b.addEventListener("click", function(){
      document.getElementById("numInput").value = n; run();
    });
    chipWrap.appendChild(b);
  })(CHIP_NUMS[i]);
}
</script>

<script>
/* Auto-resize: tells the Shopify page how tall the tool is, so the embed box hugs the content. */
(function(){
  function cwPostHeight(){
    var h = document.documentElement.scrollHeight || document.body.scrollHeight;
    if (window.parent){ window.parent.postMessage({ cwHeight: h }, "*"); }
  }
  window.addEventListener("load", cwPostHeight);
  window.addEventListener("resize", cwPostHeight);
  if (window.MutationObserver){
    new MutationObserver(cwPostHeight).observe(document.body, {childList:true, subtree:true, attributes:true});
  }
  setInterval(cwPostHeight, 500);
})();
</script>
